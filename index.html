<!DOCTYPE html><html lang="en"><head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Shopify</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Flash effect bij update */
        .stat-refresh-flash {
            animation: statFlash 0.5s ease-out;
        }
        @keyframes statFlash {
            0%   { opacity: 0.3; transform: translateY(-4px); }
            100% { opacity: 1;   transform: translateY(0); }
        }

        /* Styling voor direct bewerken */
        [contenteditable="true"] {
            cursor: pointer;
            transition: background 0.2s;
            border-radius: 4px;
            display: inline-block;
        }
        [contenteditable="true"]:focus {
            outline: none;
            background: rgba(19, 172, 240, 0.1);
            box-shadow: 0 0 0 1px #13ACF0;
        }
    </style>
</head>
<body>
<div id="appBody">

<div id="settingsPage" class="settings-page">
    <div class="settings-header">
        <button id="closeSettings" class="back-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <h1>Store settings</h1>
        <div style="width:36px;"></div>
    </div>
    <div class="settings-content">
        <div class="settings-section">
            <h2 class="settings-section-title">STORE</h2>
            <div class="settings-field"><label>Store name</label><input id="cfgStoreName" type="text" placeholder="larpmax"></div>
            <div class="settings-field"><label>Logo text</label><input id="cfgLogoText" type="text" placeholder="lar" maxlength="4"></div>
            <div class="settings-field"><label>Avatar initials</label><input id="cfgAvatar" type="text" placeholder="LM" maxlength="3"></div>
        </div>

        <div class="settings-section">
            <h2 class="settings-section-title">STATS</h2>
            <div class="settings-field"><label>Total sales ($)</label><input id="cfgSales" type="text"></div>
            <div class="settings-field"><label>Gross sales ($)</label><input id="cfgGross" type="text"></div>
            <div class="settings-field"><label>Orders</label><input id="cfgOrders" type="text"></div>
            <div class="settings-field"><label>Conversion rate (%)</label><input id="cfgConv" type="text"></div>
            <div class="settings-field"><label>Active visitors</label><input id="cfgVisitors" type="text"></div>
            <div class="settings-field"><label>Orders to fulfill</label><input id="cfgFulfill" type="text"></div>
            <div class="settings-field"><label>Payments to capture</label><input id="cfgPayments" type="text"></div>
        </div>

        <div class="settings-section">
            <h2 class="settings-section-title">PUSH NOTIFICATION</h2>
            <div class="settings-field"><label>Store name</label><input id="notifStore" type="text" placeholder="Larpmax"></div>
            <div class="settings-field"><label>Amount ($)</label><input id="notifAmount" type="text" placeholder="44,95"></div>
            <button id="pushNotif" class="push-btn">Send notification</button>
        </div>
        <button id="saveSettings" class="save-btn">Save</button>
    </div>
</div>

<div id="mainPage">
    <header class="app-header">
        <div class="header-left">
            <button id="logoCircle" class="logo-tile" onclick="document.getElementById('logoUpload').click();"><span id="logoText">lar</span></button>
            <input type="file" id="logoUpload" style="display: none;" accept="image/*" onchange="updateLogo(this)">
            <span id="storeNameDisplay" class="store-name">larpify</span>
        </div>
        <div class="header-right">
            <button id="openSettings" class="bell-btn">
                <svg viewBox="0 0 18 18" fill="currentColor"><path d="m5.252 12.424-2.446-.281c-1.855-.213-2.38-2.659-.778-3.616l.065-.038a2.89 2.89 0 0 0 1.407-2.48v-.509a4.5 4.5 0 0 1 9 0v.51c0 1.016.535 1.958 1.408 2.479l.065.038c1.602.957 1.076 3.403-.778 3.616l-2.543.292v.365a2.7 2.7 0 0 1-5.4 0zm3.9.076h-2.4v.3a1.2 1.2 0 1 0 2.4 0zm-3.152-1.5h4l3.024-.348a.452.452 0 0 0 .18-.837l-.065-.038a4.4 4.4 0 0 1-.674-.495l-.073-.067a4.4 4.4 0 0 1-1.392-3.205v-.51a3 3 0 1 0-6 0v.51a4.4 4.4 0 0 1-1.391 3.205l-.073.067a4.6 4.6 0 0 1-.674.495l-.065.038a.453.453 0 0 0 .18.838z"></path></svg>
            </button>
            <div class="avatar-circle"><span id="avatarInitials">EC</span></div>
        </div>
    </header>

    <div id="contentWrapper" class="content-wrapper">
        <div class="filter-row">
            <button class="filter-btn">Last 12 hours <span class="chevron">▾</span></button>
            <button class="live-btn">
                <span class="live-dot"></span><span id="dispVisitors" contenteditable="true" inputmode="numeric">2 visitors</span>
            </button>
            <button class="report-btn" id="reportBtn">Report</button>
        </div>

        <div id="metricsViewport">
            <div id="panelA">
                <div class="stats-row">
                    <div class="stat-col">
                        <div class="stat-label">Total sales</div>
                        <div class="stat-val" id="col0val" contenteditable="true" inputmode="decimal">$1,169.61</div>
                    </div>
                    <div class="stat-col center">
                        <div class="stat-label">Orders</div>
                        <div class="stat-val muted" id="col1val" contenteditable="true" inputmode="numeric">2</div>
                    </div>
                    <div class="stat-col right">
                        <div class="stat-label">Conversion</div>
                        <div class="stat-val muted" id="col2val" contenteditable="true" inputmode="decimal">0.3%</div>
                    </div>
                </div>
                <div class="chart-area" id="chartAreaA">
                    </div>
            </div>
            
            <div id="chartPool" style="display:none">
                <svg id="chart0" viewBox="0 0 400 175">
                    <line x1="36" y1="10" x2="394" y2="10" stroke="#eeeeef" stroke-width="1"></line>
                    <line x1="36" y1="72" x2="394" y2="72" stroke="#eeeeef" stroke-width="1"></line>
                    <line x1="36" y1="133" x2="394" y2="133" stroke="#eeeeef" stroke-width="1"></line>
                    <text text-anchor="end" x="32" y="14" fill="#9ca3af" font-size="11" font-family="Inter">$1K</text>
                    <text text-anchor="end" x="32" y="76" fill="#9ca3af" font-size="11" font-family="Inter">$500</text>
                    <text text-anchor="end" x="32" y="137" fill="#9ca3af" font-size="11" font-family="Inter">$0</text>
                    <path id="chart0-dashed" d="M36,120 Q215,120 394,120" fill="none" stroke="#c8d4e0" stroke-width="1.8" stroke-dasharray="5,4" stroke-linecap="round"></path>
                    <path id="chart0-solid" d="M36,100 Q215,100 394,100" fill="none" stroke="#13ACF0" stroke-width="2.2" stroke-linecap="round"></path>
                </svg>
            </div>
        </div>

        <div class="action-section">
            <div class="action-grid">
                <div class="action-box">
                    <span id="actionFulfill" class="action-num" contenteditable="true" inputmode="numeric">4</span>
                    <p class="action-label">Orders to fulfill</p>
                </div>
                <div class="action-box">
                    <span id="actionPayments" class="action-num" contenteditable="true" inputmode="numeric">8</span>
                    <p class="action-label">Payments to capture</p>
                </div>
            </div>
        </div>
        
        <div class="promo-card">
            <span class="promo-card-title">Start selling and earn 1% back</span>
            <p class="promo-card-desc">You're earning 1% back in credits on every sale.</p>
            <button class="promo-learn-btn">Learn more</button>
        </div>
        <div style="height:110px;"></div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-center-pill">
            <button class="nav-btn active"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M12 14h-2a1 1 0 0 1-1-1v-2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v2.5a1 1 0 0 1-1 1h-2a2 2 0 0 1-2-2v-4.257c0-.796.316-1.56.879-2.122l3.707-3.707c.78-.78 2.047-.78 2.828 0l3.707 3.707a3 3 0 0 1 .879 2.122v4.257a2 2 0 0 1-2 2"></path></svg></button>
            <button class="nav-btn"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M4.976 1.5a2.75 2.75 0 0 0-2.72 2.347l-.662 4.46a9 9 0 0 0-.094 1.282v1.661a3.25 3.25 0 0 0 3.25 3.25h6.5a3.25 3.25 0 0 0 3.25-3.25v-1.66q0-.645-.095-1.283l-.66-4.46a2.75 2.75 0 0 0-2.72-2.347h-6.05Z"></path></svg></button>
            <button class="nav-btn-menu"><svg viewBox="0 0 16 16" fill="currentColor"><path d="M1 2.75a.75.75 0 0 1 .75-.75h12.5a.75.75 0 0 1 0 1.5h-12.5a.75.75 0 0 1-.75-.75M1 8a.75.75 0 0 1 .75-.75h12.5a.75.75 0 0 1 0 1.5h-12.5a.75.75 0 0 1-.75-.75M1 13.25a.75.75 0 0 1 .75-.75h12.5a.75.75 0 0 1 0 1.5h-12.5a.75.75 0 0 1-.75-.75"></path></svg></button>
        </div>
    </nav>
</div>
</div>

<script>
/* ─────────────────────────────────────────────
    1. DIRECT EDIT & SECURITY LOGIC
───────────────────────────────────────────── */
const editableIds = ['col0val', 'col1val', 'col2val', 'actionFulfill', 'actionPayments', 'dispVisitors'];

editableIds.forEach(id => {
    const el = document.getElementById(id);
    if (el) {
        el.addEventListener('keydown', function(e) {
            // Sta alleen cijfers en leestekens toe
            const allowedCodes = [8, 9, 13, 27, 46, 110, 188, 190];
            if (allowedCodes.includes(e.keyCode) || (e.keyCode >= 35 && e.keyCode <= 40) || (e.keyCode >= 48 && e.keyCode <= 57) || (e.keyCode >= 96 && e.keyCode <= 105)) {
                return;
            }
            e.preventDefault();
        });

        if (id === 'dispVisitors') {
            el.addEventListener('focus', function() { this.innerText = this.innerText.replace(" visitors", ""); });
            el.addEventListener('blur', function() { 
                let val = this.innerText.replace(/[^0-9]/g, '');
                this.innerText = (val || "0") + " visitors"; 
            });
        }
    }
});

/* ─────────────────────────────────────────────
    2. LOGO UPLOAD
───────────────────────────────────────────── */
function updateLogo(input) {
    if (input.files && input.files[0]) {
        var reader = new FileReader();
        reader.onload = function(e) {
            var logoCircle = document.getElementById('logoCircle');
            logoCircle.style.backgroundImage = "url('" + e.target.result + "')";
            logoCircle.style.backgroundSize = "cover";
            document.getElementById('logoText').style.opacity = "0";
        };
        reader.readAsDataURL(input.files[0]);
    }
}

/* ─────────────────────────────────────────────
    3. SMOOTH CHART LOGIC (MOBILE PROOF)
───────────────────────────────────────────── */
function randomChartPath() {
    const xStart = 36, xEnd = 394, yMin = 30, yMax = 120, steps = 7;
    const stepX = (xEnd - xStart) / (steps - 1);
    const pts = [];
    for (let i = 0; i < steps; i++) {
        pts.push({ x: xStart + (i * stepX), y: yMin + Math.random() * (yMax - yMin) });
    }
    let d = `M${pts[0].x},${pts[0].y}`;
    for (let i = 0; i < pts.length - 1; i++) {
        const p0 = pts[i], p1 = pts[i + 1];
        const cp1x = p0.x + (p1.x - p0.x) / 2;
        d += ` C${cp1x},${p0.y} ${cp1x},${p1.y} ${p1.x},${p1.y}`;
    }
    return d;
}

function morphPath(pathEl, newD) {
    if (!pathEl) return;
    pathEl.animate([{ d: pathEl.getAttribute('d') }, { d: newD }], {
        duration: 800, easing: 'cubic-bezier(0.4, 0, 0.2, 1)', fill: 'forwards'
    });
    pathEl.setAttribute('d', newD);
}

function randomiseCharts() {
    const solid = document.getElementById('chart0-solid');
    const dashed = document.getElementById('chart0-dashed');
    if (solid) morphPath(solid, randomChartPath());
    if (dashed) morphPath(dashed, randomChartPath());
}

/* ─────────────────────────────────────────────
    4. REFRESH REPORT
───────────────────────────────────────────── */
function refreshReportStats() {
    const totalSales = 1000 + Math.random() * 5000;
    const orders = Math.round(2 + Math.random() * 10);
    const conversion = (0.1 + Math.random() * 2.0).toFixed(1);
    const visitors = Math.round(5 + Math.random() * 50);

    const c0 = document.getElementById('col0val');
    const c1 = document.getElementById('col1val');
    const c2 = document.getElementById('col2val');
    const vis = document.getElementById('dispVisitors');

    if (c0) { c0.textContent = '$' + totalSales.toLocaleString('en-US', {minimumFractionDigits: 2}); flashEl(c0); }
    if (c1) { c1.textContent = orders; flashEl(c1); }
    if (c2) { c2.textContent = conversion + '%'; flashEl(c2); }
    if (vis) { vis.textContent = visitors + " visitors"; }

    randomiseCharts();
}

function flashEl(el) {
    el.classList.remove('stat-refresh-flash');
    void el.offsetWidth;
    el.classList.add('stat-refresh-flash');
}

/* ─────────────────────────────────────────────
    5. UI CONTROLS
───────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', function() {
    // Laad grafiek in viewport
    document.getElementById('chartAreaA').innerHTML = document.getElementById('chartPool').innerHTML;

    // Report knop
    document.getElementById('reportBtn').addEventListener('click', refreshReportStats);

    // Settings open/close
    document.getElementById('openSettings').onclick = () => document.getElementById('settingsPage').classList.add('active');
    document.getElementById('closeSettings').onclick = () => document.getElementById('settingsPage').classList.remove('active');
    document.getElementById('saveSettings').onclick = () => document.getElementById('settingsPage').classList.remove('active');
});
</script>
</body></html>
